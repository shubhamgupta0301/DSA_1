<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#e9ecef;
    }

    .card{
      width:320px;
      background:#f5f5f5;
      border-radius:18px;
      padding:25px 20px;
      text-align:center;
      box-shadow:
        8px 8px 15px rgba(0,0,0,0.08),
        -8px -8px 15px rgba(255,255,255,0.9);
      position:relative;
    }

    .top-icons{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
      color:#666;
      font-size:18px;
    }

    .profile-img{
      width:110px;
      height:110px;
      border-radius:50%;
      overflow:hidden;
      margin:auto;
      padding:5px;
      background:#f5f5f5;
      box-shadow:
        6px 6px 12px rgba(0,0,0,0.1),
        -6px -6px 12px rgba(255,255,255,0.9);
    }

    .profile-img img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
    }

    h2{
      margin-top:18px;
      font-size:30px;
      color:#333;
    }

    p{
      margin-top:5px;
      color:#777;
      font-size:18px;
    }

    .social-icons{
      display:flex;
      justify-content:center;
      gap:18px;
      margin:25px 0;
    }

    .social-icons a{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      background:#f5f5f5;
      box-shadow:
        5px 5px 10px rgba(0,0,0,0.08),
        -5px -5px 10px rgba(255,255,255,0.9);
      color:#555;
      font-size:18px;
    }

    .buttons{
      display:flex;
      gap:15px;
      margin-bottom:25px;
    }

    .buttons button{
      flex:1;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#f5f5f5;
      box-shadow:
        5px 5px 10px rgba(0,0,0,0.08),
        -5px -5px 10px rgba(255,255,255,0.9);
      font-size:16px;
      cursor:pointer;
      color:#444;
      transition:0.3s;
    }

    .buttons button:hover{
      transform:translateY(-2px);
    }

    .stats{
      display:flex;
      justify-content:space-around;
      margin-top:10px;
      color:#666;
      font-size:16px;
    }

    .stats div{
      display:flex;
      align-items:center;
      gap:6px;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="top-icons">
      <i class="fa-solid fa-arrow-left"></i>
      <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <div class="profile-img">
      <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=400"
        alt="profile">
    </div>

    <h2>DetroxLogic</h2>
    <p>Designer & Developer</p>

    <div class="social-icons">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <div class="buttons">
      <button>Message</button>
      <button>Subscribe</button>
    </div>

    <div class="stats">
      <div><i class="fa-regular fa-heart"></i> 20.4k</div>
      <div><i class="fa-regular fa-comment"></i> 14.3k</div>
      <div><i class="fa-solid fa-share"></i> 12.8k</div>
    </div>

  </div>

</body>
</html>
