<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="syyle.css">

    <title>Flipkart Clone</title>
</head>

<body>

    <header>

        <div class="top-nav">

            <!-- LEFT -->
            <div class="top-left">

                <button class="flipkart-btn">
                    <i class="fa-solid fa-bag-shopping"></i>
                    Flipkart
                </button>

                <button class="travel-btn">
                    ✈️ Travel
                </button>

            </div>

            <div class="top-right">

                <i class="fa-solid fa-location-dot"></i>

                <span>
                    <b>Location not set</b>
                    <a href="#">Select delivery location</a>
                </span>

            </div>

        </div>


        <div class="bottom-nav">
            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input type="text"
                    placeholder="Search for Products, Brands and More">

            </div>

            <div class="menu">

                <div class="menu-item">
                    <i class="fa-regular fa-user"></i>
                    <span>Login</span>
                    <i class="fa-solid fa-angle-down"></i>
                </div>

                <div class="menu-item">
                    <span>More</span>
                    <i class="fa-solid fa-angle-down"></i>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span>Cart</span>
                </div>

            </div>
            <div class="nav-links-container">

                
            </div>
            <nav id="nav-links">
                <div class="icone-item">Box 1</div>
                <div class="icone-item">Box 2</div>
                <div class="icone-item">Box 3</div>
                <div class="icone-item">Box 4</div>
                <div class="icone-item">Box 5</div>
                <div class="icone-item">Box 6</div>
                <div class="icone-item">Box 7</div>
                <div class="icone-item">Box 8</div>
                <div class="icone-item">Box 9</div>
                <div class="icone-item">Box 10</div>
                <div class="icone-item">Box 11</div>
                <div class="icone-item">Box 12</div>
                <div class="icone-item">Box 13</div>
                <div class="icone-item">Box 14</div>
            </nav>
        </div>

    </header>
    <main>
        <section id="banner-container">
            <div class="ad-banner">Ad-Box 1</div>
            <div class="ad-banner">Ad-Box 2</div>
            <div class="ad-banner">Ad-Box 3</div>
        </section>
    </main>

</body>

</html>
